<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Joining Notebook... | CoLearn AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>
    <style>
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen">
    
    <div id="loading" class="text-center space-y-6 flex flex-col items-center">
        <a href="home.html" class="mb-4 block hover:opacity-80 transition-opacity">
            <div class="h-16 w-16 bg-white rounded-2xl shadow-xl flex items-center justify-center p-2 mx-auto overflow-hidden">
                <img src="logo.jpeg" alt="CoLearn AI Logo" class="w-full h-full object-contain"/>
            </div>
        </a>
        <div class="w-16 h-16 border-4 border-primary/20 border-t-primary rounded-full animate-spin shadow-[0_0_30px_rgba(173,198,255,0.4)]"></div>
        <div>
            <h2 class="text-2xl font-bold tracking-tight mb-2">Joining Shared Notebook</h2>
            <p class="text-on-surface-variant text-sm">Please wait while we establish your secure connection...</p>
        </div>
    </div>

    <div id="error-box" class="hidden text-center max-w-sm p-8 bg-surface-container rounded-3xl border border-error/20 shadow-2xl">
        <div class="w-16 h-16 bg-error/10 text-error rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-[32px]">link_off</span>
        </div>
        <h2 class="text-xl font-bold mb-2">Link Expired or Invalid</h2>
        <p id="error-msg" class="text-on-surface-variant text-sm mb-8">The notebook link you provided could not be verified.</p>
        <a href="home.html" class="inline-block px-6 py-3 bg-surface-container-high hover:bg-surface-bright rounded-xl font-bold text-sm transition-all shadow-sm">Go to Dashboard</a>
    </div>

    <script>
        async function joinNotebook() {
            const tokenUserStr = localStorage.getItem('colearn_token');
            if (!tokenUserStr) {
                // Save redirect url so user can log in and come back
                localStorage.setItem('colearn_redirect', window.location.href);
                window.location.href = 'login.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const shareToken = params.get('token');

            if (!shareToken) {
                showError("No invite token found in the URL.");
                return;
            }

            try {
                const res = await fetch('/api/notebooks/join/link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${tokenUserStr}`
                    },
                    body: JSON.stringify({ share_token: shareToken })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Failed to join notebook');
                }

                // Redirect user to the shared notebook!
                window.location.href = `notebook.html?id=${data.notebook_id}`;
                
            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-box').classList.remove('hidden');
            document.getElementById('error-msg').textContent = msg;
        }

        joinNotebook();
    </script>
</body>
</html>
